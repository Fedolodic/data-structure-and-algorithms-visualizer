<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rotated Array Search Demo</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <object data="../../common/nav.html"></object>

  <h1>Rotated Array Search</h1>
  <p>Enter numbers for a rotated sorted array and a target value.</p>
  <input id="rotArrayInput" value="4,5,6,7,0,1,2" style="width:300px" />
  <input id="rotTarget" type="number" value="0" />
  <button id="rotStartBtn">Start</button>
  <button id="rotPauseBtn">Pause</button>
  <button id="rotResetBtn">Reset</button>
  <div id="rotInfo" style="margin-top:10px"></div>
  <div id="rotArrayContainer"></div>
  <script src="rotated_search.js"></script>
</body>
</html>
