<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Binary Search Bounds Demo</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div id="nav"></div>

  <h1>Binary Search Lower/Upper Bound</h1>
  <p>Enter sorted numbers separated by commas and a target value.</p>
  <input id="bsArrayInput" value="1,2,3,4,5,6,7,8,9" style="width:300px" />
  <input id="bsTarget" type="number" value="5" />
  <button id="bsStartBtn">Start</button>
  <button id="bsPauseBtn">Pause</button>
  <button id="bsResetBtn">Reset</button>
  <div id="bsInfo" style="margin-top:10px"></div>
  <div id="bsArrayContainer"></div>
  <script src="../../common/base.js"></script>
  <script src="binary_search.js"></script>
</body>
</html>
