<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sparse Table Demo</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div id="nav"></div>

  <h1>Sparse Table Range Minimum Query Demo</h1>
  <p>Enter numbers separated by commas and specify a range to query the minimum value.</p>
  <input id="stArrayInput" value="1,3,-1,7,0,3" style="width:300px" />
  <input id="stLeft" type="number" value="1" style="width:50px" />
  <input id="stRight" type="number" value="3" style="width:50px" />
  <button id="stStartBtn">Start</button>
  <button id="stPauseBtn">Pause</button>
  <button id="stResetBtn">Reset</button>
  <div id="stArrayContainer"></div>
  <div id="stResultContainer"></div>
  <script src="../../common/base.js"></script>
  <script src="sparse_table.js"></script>
</body>
</html>
