<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LRU Cache Demo</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <object data="../../common/nav.html"></object>

  <h1>LRU Cache Demo</h1>
  <p>Enter a list of operations like <code>put 1 1,get 2,put 3 3</code>. Capacity is fixed.</p>
  <input id="lruOpsInput" value="put 1 1,put 2 2,get 1,put 3 3,get 2" style="width:400px" />
  <input id="lruCapInput" type="number" value="2" min="1" style="width:60px" />
  <button id="lruStartBtn">Start</button>
  <button id="lruPauseBtn">Pause</button>
  <button id="lruResetBtn">Reset</button>
  <div id="lruOpInfo" style="margin-top:10px"></div>
  <div id="lruCacheContainer" style="margin-top:10px; display:flex"></div>
  <script src="lru_cache.js"></script>
</body>
</html>
