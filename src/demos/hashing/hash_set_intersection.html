<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hash-Set Intersection Demo</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div id="nav"></div>

  <h1>Hash-Set Intersection Demo</h1>
  <p>Enter two arrays (comma separated) to see their intersection.</p>
  <input id="hsiArray1Input" value="1,2,3,4" style="width:200px" />
  <input id="hsiArray2Input" value="3,4,5" style="width:200px" />
  <button id="hsiStartBtn">Start</button>
  <button id="hsiPauseBtn">Pause</button>
  <button id="hsiResetBtn">Reset</button>
  <div id="hsiArray1Container"></div>
  <div id="hsiArray2Container" style="margin-top:10px"></div>
  <div id="hsiResultContainer" style="margin-top:10px"></div>
  <script src="../../common/base.js"></script>
  <script src="hash_set_intersection.js"></script>
</body>
</html>
