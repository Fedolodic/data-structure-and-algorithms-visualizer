<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anagram Search Demo</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <object data="../../common/nav.html"></object>

  <h1>Sliding Window Anagram Search</h1>
  <p>Enter a text string and a pattern. The demo highlights a sliding window and detects when it forms an anagram of the pattern.</p>
  <input id="swcTextInput" value="cbaebabacd" style="width:200px" />
  <input id="swcPatternInput" value="abc" style="width:100px" />
  <button id="swcStartBtn">Start</button>
  <button id="swcPauseBtn">Pause</button>
  <button id="swcResetBtn">Reset</button>
  <div id="swcTextContainer"></div>
  <div id="swcMapContainer" style="margin-top:20px"></div>
  <script src="../../common/base.js"></script>
  <script src="anagram_counter.js"></script>
</body>
</html>
